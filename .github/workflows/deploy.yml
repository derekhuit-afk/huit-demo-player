name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          ELEVENLABS_API_KEY: placeholder
      - run: echo "✅ Build valid — Vercel GitHub integration will deploy automatically"
